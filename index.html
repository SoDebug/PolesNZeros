<!DOCTYPE html>
<html lang="zh-CN">
 <head> 
  <meta charset="UTF-8" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>S平面极零点 3D 交互教学</title> 
  <!-- 1. Plotly.js --> 
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script> 
  <!-- 彻底解决冲突：使用 MathJax 2.7.9 --> 
  <script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [['$','$'], ['\\(','\\)']],
      processEscapes: true
    },
    messageStyle: "none",
    showMathMenu: false,
    SVG: { linebreaks: { automatic: true } }
  });
</script> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-MML-AM_SVG"></script> 
  <link rel="stylesheet" href="./css/Rendering.css" /> 
 </head> 
 <body> 
  <header> 
   <h2>S平面: 极点与零点 3D 动态可视化</h2> 
  </header> 
  <main class="container"> 
   <!-- 左侧：控制面板 --> 
   <aside class="controls"> 
    <h3>参数控制</h3> 
    <section class="control-group"> 
     <label>极点实部 ($\sigma$): <span id="val-pr">-1.0</span></label> 
     <input type="range" id="pr" min="-3" max="3" step="0.1" value="-1.0" /> 
     <label>极点虚部 ($j\omega$): <span id="val-pi">2.0</span></label> 
     <input type="range" id="pi" min="-5" max="5" step="0.1" value="2.0" /> 
    </section> 
    <hr class="divider" /> 
    <section class="control-group"> 
     <label>零点实部 ($\sigma$): <span id="val-zr">0.0</span></label> 
     <input type="range" id="zr" min="-3" max="3" step="0.1" value="0.0" /> 
     <label>零点虚部 ($j\omega$): <span id="val-zi">0.0</span></label> 
     <input type="range" id="zi" min="-5" max="5" step="0.1" value="0.0" /> 
    </section> 
    <hr class="divider" /> 
    <section class="observation-section"> 
     <h4>快速探索示例</h4> 
     <div class="preset-buttons"> 
      <button class="m3-btn" onclick="applyPreset('resonance')">高Q谐振峰</button> 
      <button class="m3-btn" onclick="applyPreset('notch')">陷波器 (Notch)</button> 
      <button class="m3-btn" onclick="applyPreset('unstable')">不稳定系统</button> 
      <button class="m3-btn" onclick="applyPreset('cancel')">零极点抵消</button> 
     </div> 
     <div id="example-desc" class="example-description">
       点击上方按钮观察系统特性。 
     </div> 
    </section> 
    <div class="note"> 
     <div class="info-header"> 
      <strong>&#55357;&#56481; 稳定性原理</strong> 
      <span class="info-badge">悬浮详情</span> 
     </div> 
     <p>1. 极点在右平面 ($\sigma &gt; 0$) 系统发散。</p> 
     <p>2. 观察 $j\omega$ 轴（黑线）上的幅度。</p> 
     <div class="tooltip-box"> 
      <h4>稳定性深度解析</h4> 
      <ul> 
       <li>$\sigma &lt; 0$：时域响应 $e^{\sigma t}$ 衰减（稳定）。</li> 
       <li>$\sigma &gt; 0$：时域响应 $e^{\sigma t}$ 爆炸（发散）。</li> 
       <li><strong>视觉指示</strong>：发散时波形图变为红色。</li> 
      </ul> 
     </div> 
    </div> 
   </aside> 
   <!-- 右侧：绘图区（平级关系） --> 
   <section class="plot-area"> 
    <div id="plot-div"></div> 
    <div id="time-plot-div"></div> 
   </section> 
  </main> 
  <script src="./js/calculate.js"></script>  
 </body>
</html>
